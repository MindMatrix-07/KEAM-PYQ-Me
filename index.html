<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEAM PYQ - All Previous Year Questions</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #333;
        }
        .pdf-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .header {
            background-color: #2196F3;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        .download-btn {
            background-color: white;
            color: #2196F3;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .download-btn:hover {
            background-color: #f0f0f0;
        }
        iframe {
            width: 100%;
            flex-grow: 1;
            border: none;
        }
    </style>
</head>
<body>
    <div class="pdf-container">
        <div class="header">
            <h1>KEAM Previous Year Questions (Combined)</h1>
            <a href="KEAM_PYQ_All.pdf" download class="download-btn">Download PDF</a>
        </div>
        <iframe src="KEAM_PYQ_All.pdf" title="KEAM PYQ Combined PDF">
            This browser does not support PDFs. Please download the PDF to view it: <a href="KEAM_PYQ_All.pdf">Download PDF</a>
        </iframe>
    </div>
</body>
</html>
